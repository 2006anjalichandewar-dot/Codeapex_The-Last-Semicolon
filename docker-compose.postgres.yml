services:
  postgres:
    image: postgres:15
    container_name: zerotrust_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zerotrust_docs
    ports:
      - "5432:5432"
    volumes:
      - zerotrust_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: zerotrust_redis
    ports:
      - "6379:6379"

volumes:
  zerotrust_pgdata:
